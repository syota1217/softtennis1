// ─── Firestore helpers ────────────────────────────────────────────────────────
function getFS() { return { db: window._db, ...window._fs }; }

async function fsSetDrill(drill) {
  const { db, doc, setDoc, collection } = getFS();
  await setDoc(doc(collection(db,"drills"), drill.id), drill);
}
async function fsDeleteDrill(id) {
  const { db, doc, deleteDoc, collection } = getFS();
  await deleteDoc(doc(collection(db,"drills"), id));
}
async function fsSetMenu(menu) {
  const { db, doc, setDoc, collection } = getFS();
  await setDoc(doc(collection(db,"menus"), menu.id), menu);
}
async function fsDeleteMenu(id) {
  const { db, doc, deleteDoc, collection } = getFS();
  await deleteDoc(doc(collection(db,"menus"), id));
}

// ─── Helpers ─────────────────────────────────────────────────────────────────
function groupRows(items) {
  const rows=[], seen={};
  for (const item of items) {
    const gid=item.groupId||null;
    if (!gid) { rows.push([item]); continue; }
    if (seen[gid]!==undefined) { rows[seen[gid]].push(item); }
    else { seen[gid]=rows.length; rows.push([item]); }
  }
  return rows;
}
function timeLabelStr(item) {
  if (item.timeUnit==="lap") { const l=item.lapsPerSet||1,s=item.sets||1; return s>1?`${l}周×${s}セット=${l*s}周`:`${l}周`; }
  if (item.minutesPerSet&&item.sets&&item.sets>1) return `${item.minutesPerSet}分×${item.sets}セット=${item.duration}分`;
  return `${item.duration}分`;
}

function Btn({children,onClick,variant="primary",small,disabled,style:s}){

// ─── Timer Tab ───────────────────────────────────────────────────────────────
function TimerTab({ menus }) {
  const [phase, setPhase]       = useState("select"); // select | ready | running | done
  const [selectedMenu, setSelectedMenu] = useState(null);
  const [drillList, setDrillList]       = useState([]); // 実行するドリルの平坦化リスト
  const [currentIdx, setCurrentIdx]     = useState(0);
  const [secondsLeft, setSecondsLeft]   = useState(0);
  const [isPaused, setIsPaused]         = useState(false);
  const timerRef = useRef(null);
  const beepCtx  = useRef(null);

  // メニューのドリルを平坦化（グループも含めて1つずつ）
  const flattenDrills = (drills) => {
    const result = [];
    const rows = groupRows(drills);
    rows.forEach(row => {
      row.forEach(item => {
        if (item.timeUnit === "lap") {
          result.push({ ...item, displayTime: `${(item.lapsPerSet||1)*( item.sets||1)}周`, isLap: true, durationSec: 0 });
        } else {
          result.push({ ...item, displayTime: `${item.duration}分`, isLap: false, durationSec: (item.duration||0)*60 });
        }
      });
    });
    return result;
  };

  const startMenu = (menu) => {
    const list = flattenDrills(menu.drills);
    setSelectedMenu(menu);
    setDrillList(list);
    setCurrentIdx(0);
    setPhase("ready");
  };

  const startTimer = () => {
    const drill = drillList[currentIdx];
    if (drill.isLap) {
      setPhase("running");
      setSecondsLeft(0);
    } else {
      setSecondsLeft(drill.durationSec);
      setIsPaused(false);
      setPhase("running");
    }
  };

  // カウントダウン
  useEffect(() => {
    if (phase !== "running" || isPaused) return;
    const drill = drillList[currentIdx];
    if (drill?.isLap) return; // 周は手動
    if (secondsLeft <= 0) {
      playBeep(880, 0.3);
      return;
    }
    timerRef.current = setInterval(() => {
      setSecondsLeft(s => {
        if (s <= 1) {
          clearInterval(timerRef.current);
          playBeep(880, 0.3);
          return 0;
        }
        if (s === 11) playBeep(440, 0.1); // 残り10秒ビープ
        return s - 1;
      });
    }, 1000);
    return () => clearInterval(timerRef.current);
  }, [phase, isPaused, currentIdx]);

  const playBeep = (freq, dur) => {
    try {
      if (!beepCtx.current) beepCtx.current = new (window.AudioContext || window.webkitAudioContext)();
      const ctx = beepCtx.current;
      const o = ctx.createOscillator();
      const g = ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.frequency.value = freq;
      g.gain.setValueAtTime(0.3, ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
      o.start(); o.stop(ctx.currentTime + dur);
    } catch(e) {}
  };

  const goNext = () => {
    clearInterval(timerRef.current);
    if (currentIdx >= drillList.length - 1) { setPhase("done"); return; }
    const next = currentIdx + 1;
    setCurrentIdx(next);
    const drill = drillList[next];
    setSecondsLeft(drill.isLap ? 0 : drill.durationSec);
    setIsPaused(false);
    playBeep(660, 0.2);
  };

  const goPrev = () => {
    clearInterval(timerRef.current);
    if (currentIdx <= 0) return;
    const prev = currentIdx - 1;
    setCurrentIdx(prev);
    const drill = drillList[prev];
    setSecondsLeft(drill.isLap ? 0 : drill.durationSec);
    setIsPaused(false);
  };

  const togglePause = () => {
    clearInterval(timerRef.current);
    setIsPaused(p => !p);
  };

  const reset = () => {
    clearInterval(timerRef.current);
    setPhase("select");
    setSelectedMenu(null);
    setDrillList([]);
    setCurrentIdx(0);
    setIsPaused(false);
  };

  const fmt = s => `${String(Math.floor(s/60)).padStart(2,"0")}:${String(s%60).padStart(2,"0")}`;
  const progress = drillList.length ? ((currentIdx) / drillList.length) * 100 : 0;
  const drill = drillList[currentIdx];
  const catCol = {"ウォームアップ":"#f59e0b","外周":"#84cc16","基礎打ち":"#3b82f6","球出し練習":"#8b5cf6","ラリー":"#06b6d4","サーブ・レシーブ":"#ec4899","ゲーム形式":"#22c55e","フィジカル":"#ef4444","クールダウン":"#14b8a6","休憩":"#78716c"};
  const accentCol = drill ? (catCol[drill.category] || "#15803d") : "#15803d";

  // ── メニュー選択画面 ──
  if (phase === "select") return (
    <div>
      <div style={{fontWeight:800,fontSize:16,marginBottom:6}}>練習メニューを選択</div>
      <div style={{fontSize:13,color:"#6b7280",marginBottom:16}}>実行したい保存済みメニューを選んでください</div>
      {menus.length === 0 ? (
        <div style={{background:"#fff",borderRadius:12,padding:40,textAlign:"center",color:"#9ca3af",boxShadow:"0 1px 6px #0001"}}>
          保存済みメニューがありません。<br/>先にメニューを作成・保存してください。
        </div>
      ) : menus.map(m => (
        <div key={m.id} style={{background:"#fff",borderRadius:12,padding:"14px 16px",marginBottom:10,boxShadow:"0 1px 6px #0001",borderLeft:"4px solid #15803d"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",gap:8}}>
            <div>
              <div style={{fontWeight:800,fontSize:15,marginBottom:3}}>{m.name}</div>
              <div style={{fontSize:12,color:"#9ca3af"}}>{m.createdAt} ／ {m.drills.length}ドリル ／ 合計{m.total}分</div>
            </div>
            <button onClick={()=>startMenu(m)} style={{background:"#15803d",border:"none",color:"#fff",borderRadius:10,padding:"10px 18px",fontWeight:800,fontSize:14,cursor:"pointer",whiteSpace:"nowrap"}}>▶ 開始</button>
          </div>
        </div>
      ))}
    </div>
  );

  // ── 準備画面 ──
  if (phase === "ready") return (
    <div style={{background:"#fff",borderRadius:16,padding:24,boxShadow:"0 2px 12px #0002",textAlign:"center"}}>
      <div style={{fontSize:13,color:"#6b7280",marginBottom:4}}>練習メニュー</div>
      <div style={{fontWeight:900,fontSize:20,color:"#15803d",marginBottom:20}}>{selectedMenu.name}</div>
      <div style={{background:"#f9fafb",borderRadius:12,padding:16,marginBottom:20,textAlign:"left"}}>
        {drillList.map((d,i)=>(
          <div key={i} style={{display:"flex",alignItems:"center",gap:10,padding:"6px 0",borderBottom:i<drillList.length-1?"1px solid #f3f4f6":"none"}}>
            <span style={{fontSize:12,color:"#9ca3af",width:20,textAlign:"right",flexShrink:0}}>{i+1}</span>
            <span style={{fontSize:13,fontWeight:600,flex:1}}>{d.name}</span>
            <span style={{fontSize:12,color:"#6b7280",whiteSpace:"nowrap"}}>{d.displayTime}</span>
          </div>
        ))}
      </div>
      <div style={{display:"flex",gap:10,justifyContent:"center"}}>
        <button onClick={reset} style={{background:"#f3f4f6",border:"none",color:"#374151",borderRadius:10,padding:"12px 24px",fontWeight:700,fontSize:15,cursor:"pointer"}}>← 戻る</button>
        <button onClick={startTimer} style={{background:"#15803d",border:"none",color:"#fff",borderRadius:10,padding:"12px 32px",fontWeight:800,fontSize:16,cursor:"pointer",boxShadow:"0 3px 12px #15803d44"}}>▶ スタート</button>
      </div>
    </div>
  );

  // ── 完了画面 ──
  if (phase === "done") return (
    <div style={{background:"#fff",borderRadius:16,padding:32,boxShadow:"0 2px 12px #0002",textAlign:"center"}}>
      <div style={{fontSize:48,marginBottom:16}}>🎾</div>
      <div style={{fontWeight:900,fontSize:22,color:"#15803d",marginBottom:8}}>練習完了！</div>
      <div style={{fontSize:14,color:"#6b7280",marginBottom:24}}>{selectedMenu.name}  お疲れ様でした</div>
      <button onClick={reset} style={{background:"#15803d",border:"none",color:"#fff",borderRadius:10,padding:"12px 32px",fontWeight:800,fontSize:16,cursor:"pointer"}}>← メニューに戻る</button>
    </div>
  );

  // ── 実行画面 ──
  const timeRatio = drill.durationSec > 0 ? secondsLeft / drill.durationSec : 0;
  const isLastTen = !drill.isLap && secondsLeft <= 10 && secondsLeft > 0;
  const isDone    = !drill.isLap && secondsLeft === 0;
  const setLabels = (drill.setLabels||[]).filter(l=>l);

  return (
    <div>
      {/* 進捗バー */}
      <div style={{background:"#fff",borderRadius:12,padding:"12px 16px",marginBottom:12,boxShadow:"0 1px 6px #0001"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
          <span style={{fontSize:12,fontWeight:700,color:"#6b7280"}}>{selectedMenu.name}</span>
          <span style={{fontSize:12,color:"#6b7280"}}>{currentIdx+1} / {drillList.length}</span>
        </div>
        <div style={{background:"#e5e7eb",borderRadius:99,height:8,overflow:"hidden"}}>
          <div style={{background:"#15803d",height:"100%",width:`${progress}%`,borderRadius:99,transition:"width .4s"}}/>
        </div>
      </div>

      {/* メインカード */}
      <div style={{background:"#fff",borderRadius:16,padding:24,boxShadow:"0 2px 12px #0002",marginBottom:12}}>
        {/* カテゴリ */}
        <div style={{textAlign:"center",marginBottom:8}}>
          <span style={{display:"inline-block",padding:"3px 14px",borderRadius:99,fontSize:12,fontWeight:700,background:accentCol+"22",color:accentCol,border:`1px solid ${accentCol}44`}}>{drill.category}</span>
        </div>

        {/* ドリル名 */}
        <div style={{textAlign:"center",fontWeight:900,fontSize:22,color:"#111",marginBottom:8,lineHeight:1.3}}>{drill.name}</div>

        {/* 対象 */}
        {formatTarget(drill.grade,drill.gender)!=="全体"&&(
          <div style={{textAlign:"center",marginBottom:8}}>
            <span style={{fontSize:12,background:"#e0f2fe",color:"#0369a1",border:"1px solid #7dd3fc",borderRadius:99,padding:"2px 10px",fontWeight:700}}>👥{formatTarget(drill.grade,drill.gender)}</span>
          </div>
        )}

        {/* セットラベル */}
        {setLabels.length>0&&(
          <div style={{display:"flex",gap:6,justifyContent:"center",flexWrap:"wrap",marginBottom:12}}>
            {setLabels.map((l,i)=>{const c={"フォア":"#3b82f6","バック":"#ec4899","回り込み":"#f59e0b"}[l]||"#6b7280";return<span key={i} style={{fontSize:12,background:c+"18",border:`1px solid ${c}44`,borderRadius:99,padding:"2px 10px",color:c,fontWeight:700}}>{i+1}.{l}</span>;})}
          </div>
        )}

        {/* タイマー表示 */}
        {drill.isLap ? (
          <div style={{textAlign:"center",padding:"20px 0"}}>
            <div style={{fontSize:48,marginBottom:8}}>🏃</div>
            <div style={{fontWeight:900,fontSize:28,color:accentCol,marginBottom:4}}>{drill.displayTime}</div>
            <div style={{fontSize:13,color:"#6b7280"}}>完了したら「次へ」を押してください</div>
          </div>
        ) : (
          <div style={{textAlign:"center",padding:"12px 0"}}>
            {/* 円形プログレス風タイマー */}
            <div style={{position:"relative",width:160,height:160,margin:"0 auto 8px"}}>
              <svg width="160" height="160" style={{position:"absolute",top:0,left:0,transform:"rotate(-90deg)"}}>
                <circle cx="80" cy="80" r="70" fill="none" stroke="#e5e7eb" strokeWidth="10"/>
                <circle cx="80" cy="80" r="70" fill="none" stroke={isDone?"#9ca3af":isLastTen?"#ef4444":accentCol} strokeWidth="10"
                  strokeDasharray={`${2*Math.PI*70}`}
                  strokeDashoffset={`${2*Math.PI*70*(1-timeRatio)}`}
                  strokeLinecap="round" style={{transition:"stroke-dashoffset .9s linear,stroke .3s"}}/>
              </svg>
              <div style={{position:"absolute",inset:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}>
                <div style={{fontWeight:900,fontSize:36,color:isDone?"#9ca3af":isLastTen?"#ef4444":"#111",fontVariantNumeric:"tabular-nums",letterSpacing:1}}>{fmt(secondsLeft)}</div>
                <div style={{fontSize:11,color:"#9ca3af"}}>{drill.displayTime}</div>
              </div>
            </div>
            {isDone&&<div style={{fontSize:13,color:"#ef4444",fontWeight:700,marginBottom:4}}>⏰ 時間終了！次へ進んでください</div>}
          </div>
        )}

        {/* 説明 */}
        {drill.description&&<div style={{background:"#f9fafb",borderRadius:8,padding:"8px 12px",fontSize:12,color:"#6b7280",textAlign:"center",marginTop:4}}>{drill.description}</div>}
      </div>

      {/* コントロールボタン */}
      <div style={{background:"#fff",borderRadius:12,padding:16,boxShadow:"0 1px 6px #0001",display:"flex",gap:10,justifyContent:"center",alignItems:"center"}}>
        <button onClick={goPrev} disabled={currentIdx===0} style={{background:"#f3f4f6",border:"none",color:currentIdx===0?"#d1d5db":"#374151",borderRadius:10,width:52,height:52,fontSize:20,cursor:currentIdx===0?"not-allowed":"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>⏮</button>
        {!drill.isLap&&(
          <button onClick={togglePause} style={{background:isPaused?"#15803d":"#f3f4f6",border:"none",color:isPaused?"#fff":"#374151",borderRadius:10,width:64,height:64,fontSize:24,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",boxShadow:isPaused?"0 2px 10px #15803d44":"none"}}>
            {isPaused?"▶":"⏸"}
          </button>
        )}
        <button onClick={goNext} style={{background:"#15803d",border:"none",color:"#fff",borderRadius:10,width:52,height:52,fontSize:20,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",boxShadow:"0 2px 10px #15803d44"}}>⏭</button>
      </div>

      {/* 終了ボタン */}
      <div style={{textAlign:"center",marginTop:12}}>
        <button onClick={reset} style={{background:"none",border:"none",color:"#9ca3af",fontSize:12,cursor:"pointer",textDecoration:"underline"}}>練習を終了する</button>
      </div>
    </div>
  );
}

// ─── Login Screen ─────────────────────────────────────────────────────────────
function LoginScreen({ onLogin }) {
  const [schoolName, setSchoolName] = useState("");
  const [passcode,   setPasscode]   = useState("");
  const [mode,       setMode]       = useState("login"); // login | register
  const [error,      setError]      = useState("");

  // 登録済みアカウント一覧をlocalStorageから取得
  const getAccounts = () => { try { return JSON.parse(localStorage.getItem("st_accounts")||"[]"); } catch { return []; } };

  const handleLogin = () => {
    setError("");
    if (!schoolName.trim()) { setError("学校名を入力してください"); return; }
    if (!passcode.trim())   { setError("パスコードを入力してください"); return; }
    const accounts = getAccounts();
    const found = accounts.find(a => a.schoolName === schoolName.trim());
    if (!found) { setError("学校名が見つかりません。新規登録してください"); return; }
    if (found.passcode !== passcode) { setError("パスコードが違います"); return; }
    localStorage.setItem("st_session", JSON.stringify({ schoolName: found.schoolName }));
    onLogin(found.schoolName);
  };

  const handleRegister = () => {
    setError("");
    if (!schoolName.trim()) { setError("学校名を入力してください"); return; }
    if (passcode.length < 4) { setError("パスコードは4文字以上で設定してください"); return; }
    const accounts = getAccounts();
    if (accounts.find(a => a.schoolName === schoolName.trim())) {
      setError("この学校名はすでに登録されています。ログインタブからパスコードでログインしてください");
      setMode("login");
      return;
    }
    accounts.push({ schoolName: schoolName.trim(), passcode });
    localStorage.setItem("st_accounts", JSON.stringify(accounts));
    localStorage.setItem("st_session", JSON.stringify({ schoolName: schoolName.trim() }));
    onLogin(schoolName.trim());
  };

  return (
    <div style={{minHeight:"100vh",background:"linear-gradient(135deg,#15803d,#166534)",display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
      <div style={{background:"#fff",borderRadius:20,padding:32,width:"100%",maxWidth:380,boxShadow:"0 20px 60px #00000033"}}>
        <div style={{textAlign:"center",marginBottom:28}}>
          <div style={{fontSize:40,marginBottom:8}}>🎾</div>
          <div style={{fontWeight:900,fontSize:20,color:"#15803d"}}>ソフトテニス</div>
          <div style={{fontWeight:900,fontSize:20,color:"#15803d",marginBottom:4}}>練習メニュービルダー</div>
          <div style={{fontSize:12,color:"#9ca3af"}}>学校ごとにデータを管理します</div>
        </div>

        {/* タブ切り替え */}
        <div style={{display:"flex",background:"#f3f4f6",borderRadius:10,padding:3,marginBottom:20}}>
          {[["login","ログイン"],["register","新規登録"]].map(([m,label])=>(
            <button key={m} onClick={()=>{setMode(m);setError("");}} style={{flex:1,padding:"8px",borderRadius:8,border:"none",background:mode===m?"#fff":"transparent",color:mode===m?"#15803d":"#6b7280",fontWeight:mode===m?800:500,fontSize:13,cursor:"pointer",boxShadow:mode===m?"0 1px 4px #0001":"none",transition:"all .15s"}}>{label}</button>
          ))}
        </div>

        <div style={{marginBottom:14}}>
          <div style={{fontSize:12,fontWeight:700,color:"#6b7280",marginBottom:5}}>学校名</div>
          <input value={schoolName} onChange={e=>setSchoolName(e.target.value)} placeholder="例: ○○市立○○中学校"
            style={{width:"100%",boxSizing:"border-box",border:"2px solid #e5e7eb",borderRadius:8,padding:"10px 12px",fontSize:14,outline:"none",fontFamily:"inherit"}}
            onKeyDown={e=>e.key==="Enter"&&(mode==="login"?handleLogin():handleRegister())}/>
        </div>
        <div style={{marginBottom:20}}>
          <div style={{fontSize:12,fontWeight:700,color:"#6b7280",marginBottom:5}}>パスコード</div>
          <input type="password" value={passcode} onChange={e=>setPasscode(e.target.value)} placeholder={mode==="register"?"4文字以上で設定":"パスコードを入力"}
            style={{width:"100%",boxSizing:"border-box",border:"2px solid #e5e7eb",borderRadius:8,padding:"10px 12px",fontSize:14,outline:"none",fontFamily:"inherit"}}
            onKeyDown={e=>e.key==="Enter"&&(mode==="login"?handleLogin():handleRegister())}/>
        </div>

        {error&&<div style={{background:"#fef2f2",color:"#ef4444",borderRadius:8,padding:"8px 12px",fontSize:13,marginBottom:14}}>{error}</div>}

        <button onClick={mode==="login"?handleLogin:handleRegister}
          style={{width:"100%",background:"#15803d",border:"none",color:"#fff",borderRadius:10,padding:"13px",fontWeight:800,fontSize:15,cursor:"pointer",boxShadow:"0 3px 12px #15803d44"}}>
          {mode==="login"?"ログイン":"登録してはじめる"}
        </button>

        {mode==="register"&&<div style={{fontSize:11,color:"#9ca3af",textAlign:"center",marginTop:12}}>※ パスコードは他のコーチと共有してください</div>}
      </div>
    </div>
  );
}

// ─── Main App ────────────────────────────────────────────────────────────────
function App() {
  const [dbReady, setDbReady]  = useState(!!window._dbReady);
  const [syncing, setSyncing]  = useState(false);
  // ログイン状態
  const savedSession = (() => { try { return JSON.parse(localStorage.getItem("st_session")||"null"); } catch { return null; } })();
  const [loggedIn,    setLoggedIn]    = useState(!!savedSession);
  const [schoolName,  setSchoolName]  = useState(savedSession?.schoolName||"");
  const [tab,setTab]           = useState("builder");
  const [drills,setDrills]     = useState([]);
  const [menus,setMenus]       = useState([]);
  const [menuName,setMenuName] = useState("今日の練習");
  const [selected,setSelected] = useState([]);
  const [filterCat,setFilterCat] = useState("すべて");
  const [filterQ,setFilterQ]     = useState("");
  const [drillModal,setDrillModal] = useState(null);
  const [form,setForm]             = useState(EMPTY_FORM);
  const [printDate,setPrintDate]   = useState(()=>new Date().toISOString().slice(0,10));
  const initializedRef = useRef(false);

  // DB 準備完了を待つ
  useEffect(()=>{
    if(window._dbReady){ setDbReady(true); return; }
    const h=()=>setDbReady(true);
    window.addEventListener("dbReady",h);
    return()=>window.removeEventListener("dbReady",h);
  },[]);

  // Firestore リアルタイム購読
  useEffect(()=>{
    if(!dbReady) return;
    const {db,collection,onSnapshot}=getFS();

    // drills 購読
    const unsubDrills = onSnapshot(collection(db,"drills"), snap=>{
      const data = snap.docs.map(d=>d.data());
      if(data.length===0 && !initializedRef.current){
        // 初回：デフォルトデータを投入
        initializedRef.current=true;
        DEFAULT_DRILLS.forEach(drill=>fsSetDrill(drill));
      } else {
        initializedRef.current=true;
        setDrills(data.sort((a,b)=>a.id.localeCompare(b.id)));
      }
    });

    // menus 購読
    const unsubMenus = onSnapshot(collection(db,"menus"), snap=>{
      const data = snap.docs.map(d=>d.data());
      setMenus(data.sort((a,b)=>b.createdAt?.localeCompare?.(a.createdAt)||0));
    });

    return()=>{ unsubDrills(); unsubMenus(); };
  },[dbReady]);

  const newUid = () => "u"+(Date.now()+Math.random()).toString(36);

  // ── Drill CRUD ──
  const openNew  = () => { setForm({...EMPTY_FORM}); setDrillModal("new"); };
  const openEdit = d => { const sts=d.sets||1; setForm({...d,minutesPerSet:d.minutesPerSet||d.duration||5,sets:sts,setLabels:autoSetLabels(sts),grade:d.grade||"",gender:d.gender||"",timeUnit:d.timeUnit||"min",lapsPerSet:d.lapsPerSet||1}); setDrillModal(d); };
  const saveDrill = async () => {
    if(!form.name.trim()) return;
    setSyncing(true);
    const mps=Math.max(1,Number(form.minutesPerSet)||1), sts=Math.max(1,Number(form.sets)||1);
    const setLabels=Array.from({length:sts},(_,i)=>form.setLabels&&form.setLabels[i]||"");
    const isLap=form.timeUnit==="lap";
    const computed={...form,minutesPerSet:mps,sets:sts,setLabels,lapsPerSet:Number(form.lapsPerSet)||1,duration:isLap?0:mps*sts};
    if(drillModal==="new"){
      const nd={...computed,id:"d"+Date.now()};
      await fsSetDrill(nd);
    } else {
      const upd={...drillModal,...computed};
      await fsSetDrill(upd);
      setSelected(p=>p.map(s=>s.id===upd.id?{...s,...upd}:s));
    }
    setSyncing(false);
    setDrillModal(null);
  };
  const deleteDrill = async id => {
    if(!confirm("このドリルを削除しますか？"))return;
    setSyncing(true);
    await fsDeleteDrill(id);
    setSelected(p=>p.filter(s=>s.id!==id));
    setSyncing(false);
  };

  // ── Builder ──
  const addToMenu    = drill => setSelected(p=>[...p,{...drill,uid:newUid(),groupId:null}]);
  const addRest      = mins  => setSelected(p=>[...p,{uid:newUid(),id:null,name:"休憩",category:"休憩",duration:mins,minutesPerSet:mins,sets:1,setLabels:[],grade:"",gender:"",timeUnit:"min",lapsPerSet:1,description:"",groupId:null}]);
  const removeFromMenu = uid => setSelected(p=>p.filter(s=>s.uid!==uid));
  const addToGroup   = drill => {
    setSelected(p=>{
      if(!p.length) return[...p,{...drill,uid:newUid(),groupId:null}];
      const last=p[p.length-1];
      const gid=last.groupId||("g"+Date.now());
      const updated=last.groupId?p:[...p.slice(0,-1),{...last,groupId:gid}];
      return[...updated,{...drill,uid:newUid(),groupId:gid}];
    });
  };
  const detachFromGroup = uid => setSelected(p=>p.map(s=>s.uid===uid?{...s,groupId:null}:s));
  const totalMin = selected.filter(s=>s.timeUnit!=="lap").reduce((s,d)=>s+(d.duration||0),0);

  // ── Save / Load / Delete Menu ──
  const saveMenu = async () => {
    if(!selected.length) return;
    setSyncing(true);
    const m={id:"m"+Date.now(),name:menuName,drills:selected,total:totalMin,createdAt:new Date().toLocaleDateString("ja-JP")};
    await fsSetMenu(m);
    setSyncing(false);
    alert(`「${menuName}」を保存しました！`);
  };
  const loadSavedMenu = m => { setSelected(m.drills.map(d=>({...d,uid:newUid()}))); setMenuName(m.name); setTab("builder"); };
  const deleteMenu = async id => {
    if(!confirm("このメニューを削除しますか？"))return;
    setSyncing(true);
    await fsDeleteMenu(id);
    setSyncing(false);
  };

  // ── Print ──
  const printMenu = () => {
    const catCol={"ウォームアップ":"#f59e0b","外周":"#84cc16","基礎打ち":"#3b82f6","球出し練習":"#8b5cf6","ラリー":"#06b6d4","サーブ・レシーブ":"#ec4899","ゲーム形式":"#22c55e","フィジカル":"#ef4444","クールダウン":"#14b8a6","休憩":"#78716c"};
    const lblCol={"フォア":"#3b82f6","バック":"#ec4899","回り込み":"#f59e0b"};
    const rows=groupRows(selected);
    const rowCount=rows.length;
    const fs=rowCount<=8?11:rowCount<=12?10:rowCount<=16?9:8;
    const pad=rowCount<=8?"6px 8px":rowCount<=12?"4px 7px":"3px 6px";
    const dateLabel=new Date(printDate+"T00:00:00").toLocaleDateString("ja-JP",{year:"numeric",month:"long",day:"numeric"});
    const renderCell=item=>{
      const c=catCol[item.category]||"#6b7280";
      const tgt=formatTarget(item.grade,item.gender);
      const tgtH=tgt!=="全体"?`<span style="display:inline-block;padding:1px 6px;border-radius:99px;font-size:${fs-1}px;font-weight:700;background:#e0f2fe;color:#0369a1;border:1px solid #7dd3fc">👥${tgt}</span>`:"";
      const lblH=(item.setLabels||[]).filter(l=>l).map((l,si)=>{const lc=lblCol[l]||"#6b7280";return`<span style="display:inline-block;margin:1px 2px;padding:0 5px;border-radius:99px;font-size:${fs-1}px;font-weight:700;background:${lc}22;color:${lc};border:1px solid ${lc}55">${si+1}.${l}</span>`;}).join("");
      const isRest=item.category==="休憩";
      return`<div style="padding:${pad}"><div style="display:flex;align-items:center;gap:4px;flex-wrap:wrap;margin-bottom:2px"><span style="display:inline-block;padding:0 6px;border-radius:99px;font-size:${fs-1}px;font-weight:700;background:${c}22;color:${c};border:1px solid ${c}44">${item.category}</span>${tgtH}</div><div style="font-weight:${isRest?600:700};font-size:${fs+1}px;color:${isRest?"#78716c":"#111"};margin-bottom:1px">${isRest?"☕ ":""}${item.name}</div>${lblH?`<div style="margin-bottom:1px">${lblH}</div>`:""}<div style="font-size:${fs-1}px;color:#6b7280">${timeLabelStr(item)}</div>${item.description?`<div style="font-size:${fs-2}px;color:#9ca3af;margin-top:1px">${item.description}</div>`:""}</div>`;
    };
    let rn=0;
    const trows=rows.map(row=>{
      rn++;
      const bg=rn%2===0?"#f8f8f8":"#fff";
      if(row.length===1){
        const item=row[0];const isRest=item.category==="休憩";
        return`<tr style="background:${isRest?"#f5f5f4":bg}"><td class="num">${isRest?"—":rn}</td><td>${renderCell(item)}</td></tr>`;
      }
      const n=row.length;
      const cols=row.map((item,ci)=>`<td style="vertical-align:top;border-right:${ci<n-1?"1px solid #d1fae5":"none"}">${renderCell(item)}</td>`).join("");
      return`<tr style="background:${bg};border-top:2px solid #84cc16"><td class="num" style="vertical-align:middle"><div>${rn}</div><div style="font-size:7px;color:#84cc16;font-weight:700;margin-top:1px">分割</div></td><td colspan="1" style="padding:0"><table style="width:100%;border-collapse:collapse;table-layout:fixed"><colgroup>${Array(n).fill(0).map(()=>`<col style="width:${(100/n).toFixed(2)}%">`).join("")}</colgroup><tr>${cols}</tr></table></td></tr>`;
    }).join("");
    const html=`<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8"><title>${menuName}</title><style>*{box-sizing:border-box;margin:0;padding:0}html,body{width:100%}body{font-family:'Hiragino Kaku Gothic Pro','Meiryo',sans-serif;background:#fff;font-size:${fs}px}.wrap{padding:8mm 8mm 6mm;max-width:100%}.header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}.school{font-size:13px;font-weight:700;color:#15803d}.title{font-size:15px;font-weight:900;color:#111}.meta{font-size:10px;color:#6b7280}table.main{width:100%;border-collapse:collapse;border:1px solid #d1d5db;table-layout:fixed}table.main th{background:#15803d;color:#fff;padding:5px 8px;font-size:${fs}px;font-weight:700;text-align:left}table.main th.num{width:28px;text-align:center}table.main td{vertical-align:top;border-bottom:1px solid #e5e7eb;border-right:1px solid #e5e7eb}table.main td.num{width:28px;padding:4px 2px;text-align:center;color:#6b7280;font-weight:700;font-size:${fs}px;border-right:1px solid #e5e7eb;vertical-align:middle}table.main tr:last-child td{border-bottom:none}@media print{html,body{width:100%;height:100%}.wrap{padding:5mm 6mm 4mm}@page{size:A4 portrait;margin:0}}</style></head><body><div class="wrap"><div class="header"><div><div class="school">🎾 ${schoolName}</div><div class="title">${menuName}</div></div><div class="meta" style="text-align:right">${dateLabel}</div></div><table class="main"><thead><tr><th class="num">#</th><th>練習内容</th></tr></thead><tbody>${trows}</tbody></table></div><script>window.onload=()=>window.print();<\/script></body></html>`;
    const w=window.open("","_blank");if(w){w.document.write(html);w.document.close();}
  };

  const visibleDrills=drills.filter(d=>(filterCat==="すべて"||d.category===filterCat)&&(d.name.includes(filterQ)||(d.description||"").includes(filterQ)));
  const rows=groupRows(selected);

  // ログイン画面
  if (!loggedIn) return <LoginScreen onLogin={name=>{ setSchoolName(name); setLoggedIn(true); }}/>;

  // ローディング画面
  if(!dbReady||drills.length===0&&!initializedRef.current){
    return(
      <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"100vh",gap:16,color:"#15803d"}}>
        <div style={{fontSize:40}}>🎾</div>
        <div style={{fontWeight:800,fontSize:18}}>ソフトテニス 練習メニュービルダー</div>
        <div style={{fontSize:13,color:"#6b7280"}}>Firebaseに接続中...</div>
      </div>
    );
  }

  return (
    <div style={{minHeight:"100vh",background:"#f0fdf4",fontFamily:"inherit"}}>
      {/* Header */}
      <div style={{background:"linear-gradient(135deg,#15803d,#166534)",padding:"16px 16px 0",color:"#fff"}}>
        <div style={{maxWidth:700,margin:"0 auto"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
            <div>
              <div style={{fontSize:11,letterSpacing:3,opacity:.7,marginBottom:2}}>🎾 SOFT TENNIS</div>
              <div style={{fontWeight:900,fontSize:20}}>{schoolName}</div>
              <div style={{fontSize:11,opacity:.7,marginBottom:14}}>練習メニュービルダー</div>
            </div>
            <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:4,marginTop:4}}>
              <div style={{display:"flex",alignItems:"center",fontSize:11,opacity:.8}}>
                <span className="sync-dot" style={{background:syncing?"#fbbf24":"#4ade80"}}></span>
                {syncing?"保存中...":"同期済み"}
              </div>
              <button onClick={()=>{localStorage.removeItem("st_session");setLoggedIn(false);setSchoolName("");}}
                style={{background:"rgba(255,255,255,0.15)",border:"none",color:"#fff",borderRadius:6,padding:"3px 10px",fontSize:11,cursor:"pointer"}}>ログアウト</button>
            </div>
          </div>
          <div style={{display:"flex",gap:2,flexWrap:"wrap"}}>
            {[["builder","📋 作成"],["drills","🗂 ドリル"],["rest","☕ 休憩"],["timer","▶️ 実行"],["saved","💾 保存済み"]].map(([key,label])=>(
              <button key={key} onClick={()=>setTab(key)} style={{padding:"8px 12px",borderRadius:"8px 8px 0 0",border:"none",background:tab===key?"#f0fdf4":"transparent",color:tab===key?"#15803d":"#ffffffaa",fontWeight:tab===key?800:500,fontSize:12,cursor:"pointer"}}>{label}</button>
            ))}
          </div>
        </div>
      </div>

      <div style={{maxWidth:700,margin:"0 auto",padding:"20px 16px 80px"}}>

        {/* ══ BUILDER ══ */}
        {tab==="builder"&&(
          <div>
            <div style={{background:"#fff",borderRadius:12,padding:16,boxShadow:"0 1px 6px #0001",marginBottom:16}}>
              <div style={{display:"flex",gap:10,alignItems:"center",marginBottom:10}}>
                <input value={menuName} onChange={e=>setMenuName(e.target.value)} style={{flex:1,border:"2px solid #e5e7eb",borderRadius:8,padding:"9px 12px",fontSize:15,fontWeight:700,fontFamily:"inherit",outline:"none"}}/>
                <Btn onClick={saveMenu} disabled={!selected.length||syncing}>{syncing?"保存中...":"保存"}</Btn>
              </div>
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <span style={{fontSize:12,fontWeight:700,color:"#6b7280",whiteSpace:"nowrap"}}>📅 練習日</span>
                <input type="date" value={printDate} onChange={e=>setPrintDate(e.target.value)}
                  style={{border:"2px solid #e5e7eb",borderRadius:8,padding:"6px 10px",fontSize:13,fontFamily:"inherit",outline:"none",color:"#374151"}}/>
              </div>
            </div>
            <div style={{background:"#fff",borderRadius:12,boxShadow:"0 1px 6px #0001",marginBottom:16,overflow:"hidden"}}>
              <div style={{background:"#15803d",color:"#fff",padding:"12px 16px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <span style={{fontWeight:800}}>今日のメニュー</span>
                <div style={{display:"flex",alignItems:"center",gap:10}}>
                  <span style={{fontSize:13,opacity:.85}}>合計 <b>{totalMin}</b> 分</span>
                  {selected.length>0&&<button onClick={printMenu} style={{background:"#fff",border:"none",color:"#15803d",borderRadius:7,padding:"4px 12px",fontWeight:700,fontSize:12,cursor:"pointer"}}>🖨️ 印刷/PDF</button>}
                </div>
              </div>
              {selected.length===0?(
                <div style={{padding:"32px 16px",textAlign:"center",color:"#9ca3af",fontSize:14}}>下のドリル一覧から追加してください</div>
              ):(
                <div>
                  {rows.map((row,ri)=>{
                    const isGroup=row.length>1;
                    return(
                      <div key={ri} style={{borderBottom:"1px solid #f3f4f6"}}>
                        {isGroup&&<div style={{background:"#f0fdf4",borderBottom:"1px dashed #bbf7d0",padding:"3px 12px",fontSize:11,color:"#15803d",fontWeight:700}}>⑂ 同時進行（{row.length}グループ）</div>}
                        <div style={{display:"flex"}}>
                          <div style={{width:32,flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",borderRight:"1px solid #f3f4f6",color:"#9ca3af",fontSize:12,fontWeight:700}}>{ri+1}</div>
                          <div style={{flex:1,display:"flex",minWidth:0}}>
                            {row.map((item,ci)=>(
                              <div key={item.uid} style={{flex:1,minWidth:0,borderLeft:ci>0?"1px dashed #d1fae5":undefined,padding:"10px 12px"}}>
                                <DrillCard item={item}/>
                                <div style={{display:"flex",gap:4,marginTop:6}}>
                                  {isGroup&&<button onClick={()=>detachFromGroup(item.uid)} style={{fontSize:10,padding:"2px 7px",borderRadius:6,border:"1px solid #e5e7eb",background:"#f9fafb",color:"#6b7280",cursor:"pointer"}}>切り離す</button>}
                                  <button onClick={()=>removeFromMenu(item.uid)} style={{fontSize:10,padding:"2px 7px",borderRadius:6,border:"1px solid #fecaca",background:"#fef2f2",color:"#ef4444",cursor:"pointer"}}>削除</button>
                                </div>
                              </div>
                            ))}
                          </div>
                        </div>
                      </div>
                    );
                  })}
                  <div style={{padding:"10px 16px",borderTop:"1px solid #f3f4f6",display:"flex",justifyContent:"flex-end"}}>
                    <Btn small variant="ghost" onClick={()=>setSelected([])}>すべてクリア</Btn>
                  </div>
                </div>
              )}
            </div>
            <div style={{background:"#fff",borderRadius:12,boxShadow:"0 1px 6px #0001",overflow:"hidden"}}>
              <div style={{padding:"12px 16px 0",borderBottom:"1px solid #f3f4f6"}}>
                <div style={{fontWeight:800,marginBottom:10}}>ドリルを追加</div>
                <input value={filterQ} onChange={e=>setFilterQ(e.target.value)} placeholder="🔍 ドリル名で検索" style={{width:"100%",boxSizing:"border-box",border:"2px solid #e5e7eb",borderRadius:8,padding:"7px 12px",fontSize:13,marginBottom:10,fontFamily:"inherit",outline:"none"}}/>
                <div style={{display:"flex",gap:6,flexWrap:"wrap",paddingBottom:10}}>
                  {["すべて",...CATEGORIES].map(c=>(
                    <button key={c} onClick={()=>setFilterCat(c)} style={{padding:"4px 10px",borderRadius:99,fontSize:11,fontWeight:filterCat===c?700:400,border:filterCat===c?"2px solid #15803d":"2px solid #e5e7eb",background:filterCat===c?"#dcfce7":"#fff",color:filterCat===c?"#15803d":"#6b7280",cursor:"pointer"}}>{c}</button>
                  ))}
                </div>
              </div>
              <div style={{maxHeight:360,overflowY:"auto"}}>
                {visibleDrills.length===0?(<div style={{padding:24,textAlign:"center",color:"#9ca3af",fontSize:14}}>該当なし</div>)
                :visibleDrills.map(d=>(
                  <div key={d.id} style={{display:"flex",alignItems:"flex-start",gap:8,padding:"10px 14px",borderBottom:"1px solid #f9fafb"}}>
                    <DrillCard item={d}/>
                    <div style={{display:"flex",flexDirection:"column",gap:4,flexShrink:0}}>
                      <button onClick={()=>addToMenu(d)} style={{background:"#15803d",border:"none",color:"#fff",borderRadius:8,width:32,height:32,cursor:"pointer",fontSize:20,display:"flex",alignItems:"center",justifyContent:"center"}} title="単独で追加">+</button>
                      {selected.length>0&&<button onClick={()=>addToGroup(d)} style={{background:"#fff7ed",border:"1px solid #fed7aa",color:"#c2410c",borderRadius:8,width:32,height:32,cursor:"pointer",fontSize:14,display:"flex",alignItems:"center",justifyContent:"center"}} title="直前の行と同時進行">⑂</button>}
                    </div>
                  </div>
                ))}
              </div>
              <div style={{padding:"8px 14px",background:"#f9fafb",borderTop:"1px solid #f3f4f6",fontSize:11,color:"#6b7280",display:"flex",gap:16}}>
                <span><b style={{color:"#15803d"}}>＋</b> 単独で追加</span>
                <span><b style={{color:"#c2410c"}}>⑂</b> 直前の行と同時進行</span>
              </div>
            </div>
          </div>
        )}

        {/* ══ DRILLS ══ */}
        {tab==="drills"&&(
          <div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
              <span style={{fontWeight:800,fontSize:16}}>ドリル一覧（{drills.length}件）</span>
              <Btn small onClick={openNew}>＋ 新規登録</Btn>
            </div>
            <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:12}}>
              {["すべて",...CATEGORIES].map(c=>(
                <button key={c} onClick={()=>setFilterCat(c)} style={{padding:"4px 10px",borderRadius:99,fontSize:11,fontWeight:filterCat===c?700:400,border:filterCat===c?"2px solid #15803d":"2px solid #e5e7eb",background:filterCat===c?"#dcfce7":"#fff",color:filterCat===c?"#15803d":"#6b7280",cursor:"pointer"}}>{c}</button>
              ))}
            </div>
            <div style={{background:"#fff",borderRadius:12,boxShadow:"0 1px 6px #0001",overflow:"hidden"}}>
              {visibleDrills.length===0?(<div style={{padding:32,textAlign:"center",color:"#9ca3af"}}>ドリルがありません</div>)
              :visibleDrills.map((d,i)=>(
                <div key={d.id} style={{padding:"12px 16px",borderBottom:i<visibleDrills.length-1?"1px solid #f3f4f6":"none"}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:8}}>
                    <DrillCard item={d}/>
                    <div style={{display:"flex",gap:6,flexShrink:0}}>
                      <Btn small variant="ghost" onClick={()=>openEdit(d)}>編集</Btn>
                      <Btn small variant="danger" onClick={()=>deleteDrill(d.id)}>削除</Btn>
                    </div>
                  </div>
                  {d.description&&<div style={{fontSize:13,color:"#6b7280",lineHeight:1.5,marginTop:4}}>{d.description}</div>}
                </div>
              ))}
            </div>
          </div>
        )}

        {/* ══ REST ══ */}
        {tab==="rest"&&(
          <div>
            <div style={{fontWeight:800,fontSize:16,marginBottom:6}}>休憩を追加</div>
            <div style={{fontSize:13,color:"#6b7280",marginBottom:16}}>メニューに挿入したい休憩時間を選んでください</div>
            <div style={{background:"#fff",borderRadius:12,boxShadow:"0 1px 6px #0001",overflow:"hidden",marginBottom:16}}>
              {[5,10,15,20].map((mins,i,arr)=>(
                <div key={mins} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"14px 16px",borderBottom:i<arr.length-1?"1px solid #f3f4f6":"none"}}>
                  <div style={{display:"flex",alignItems:"center",gap:12}}>
                    <span style={{fontSize:22}}>☕</span>
                    <div><div style={{fontWeight:700,fontSize:15}}>休憩</div><div style={{fontSize:13,color:"#6b7280"}}>{mins}分</div></div>
                  </div>
                  <button onClick={()=>{addRest(mins);setTab("builder");}} style={{background:"#78716c",border:"none",color:"#fff",borderRadius:8,padding:"7px 18px",fontWeight:700,fontSize:14,cursor:"pointer"}}>＋ 追加</button>
                </div>
              ))}
            </div>
            <div style={{background:"#fff",borderRadius:12,boxShadow:"0 1px 6px #0001",padding:16}}>
              <div style={{fontSize:13,fontWeight:700,color:"#6b7280",marginBottom:10}}>カスタム時間</div>
              <div style={{display:"flex",gap:10,alignItems:"center"}}>
                <input type="number" id="cr" defaultValue={3} min={1} max={60} style={{width:80,border:"2px solid #e5e7eb",borderRadius:8,padding:"9px 10px",fontSize:15,fontWeight:700,textAlign:"center",outline:"none",fontFamily:"inherit"}}/>
                <span style={{color:"#6b7280",fontWeight:600}}>分</span>
                <button onClick={()=>{const v=Math.max(1,Math.min(60,Number(document.getElementById("cr").value)||1));addRest(v);setTab("builder");}} style={{background:"#78716c",border:"none",color:"#fff",borderRadius:8,padding:"9px 20px",fontWeight:700,fontSize:14,cursor:"pointer"}}>＋ 追加</button>
              </div>
            </div>
          </div>
        )}

        {/* ══ TIMER ══ */}
        {tab==="timer"&&<TimerTab menus={menus}/>}

        {/* ══ SAVED ══ */}
        {tab==="saved"&&(
          <div>
            <div style={{fontWeight:800,fontSize:16,marginBottom:14}}>保存済みメニュー（{menus.length}件）</div>
            {menus.length===0?(<div style={{background:"#fff",borderRadius:12,padding:40,textAlign:"center",color:"#9ca3af",boxShadow:"0 1px 6px #0001"}}>まだ保存されたメニューはありません</div>)
            :menus.map(m=>(
              <div key={m.id} style={{background:"#fff",borderRadius:12,padding:"14px 16px",marginBottom:10,boxShadow:"0 1px 6px #0001",borderLeft:"4px solid #15803d"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:8}}>
                  <div style={{flex:1}}>
                    <div style={{fontWeight:800,fontSize:15,marginBottom:4}}>{m.name}</div>
                    <div style={{fontSize:12,color:"#9ca3af",marginBottom:8}}>{m.createdAt} ／ {m.drills.length}ドリル ／ 合計{m.total}分</div>
                    <div style={{display:"flex",flexWrap:"wrap",gap:4}}>{m.drills.map((d,i)=><span key={i} style={{fontSize:11,background:"#f3f4f6",borderRadius:6,padding:"2px 8px",color:"#374151"}}>{d.name}</span>)}</div>
                  </div>
                  <div style={{display:"flex",flexDirection:"column",gap:6,flexShrink:0}}>
                    <Btn small onClick={()=>loadSavedMenu(m)}>読み込む</Btn>
                    <Btn small variant="danger" onClick={()=>deleteMenu(m.id)}>削除</Btn>
                  </div>
                </div>
              </div>
            ))}
          </div>
        )}
      </div>

      {/* ══ MODAL ══ */}
      {drillModal!==null&&(
        <Modal title={drillModal==="new"?"ドリルを新規登録":"ドリルを編集"} onClose={()=>setDrillModal(null)}>
          <FInput label="ドリル名 *" value={form.name} onChange={v=>setForm(p=>({...p,name:v}))} placeholder="例: クロスラリー"/>
          <FSelect label="カテゴリ" value={form.category} onChange={v=>setForm(p=>({...p,category:v}))} options={CATEGORIES}/>
          <div style={{marginBottom:14}}>
            <div style={{fontSize:12,fontWeight:700,color:"#6b7280",marginBottom:5}}>時間設定</div>
            {form.category==="外周"&&(
              <div style={{display:"flex",gap:6,marginBottom:10}}>
                {[["min","分"],["lap","周"]].map(([val,label])=>{const active=(form.timeUnit||"min")===val;return<button key={val} onClick={()=>setForm(p=>({...p,timeUnit:val}))} style={{padding:"5px 18px",borderRadius:99,fontSize:13,fontWeight:active?800:500,border:`2px solid ${active?"#84cc16":"#e5e7eb"}`,background:active?"#f7fee7":"#fff",color:active?"#4d7c0f":"#6b7280",cursor:"pointer"}}>{label}で入力</button>;})}
              </div>
            )}
            {form.category==="外周"&&form.timeUnit==="lap"?(
              <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
                <input type="number" value={form.lapsPerSet||1} onChange={e=>setForm(p=>({...p,lapsPerSet:e.target.value}))} min={1} max={100} style={{width:70,border:"2px solid #e5e7eb",borderRadius:8,padding:"9px 10px",fontSize:14,outline:"none",fontFamily:"inherit",textAlign:"center"}}/>
                <span style={{color:"#6b7280",fontWeight:600,whiteSpace:"nowrap"}}>周 ×</span>
                <div style={{display:"flex",gap:4}}>{SET_OPTIONS.map(n=>{const a=form.sets===n;return<button key={n} onClick={()=>setForm(p=>({...p,sets:n,setLabels:autoSetLabels(n)}))} style={{width:36,height:38,border:`2px solid ${a?"#84cc16":"#e5e7eb"}`,borderRadius:8,background:a?"#f7fee7":"#fff",color:a?"#4d7c0f":"#6b7280",fontWeight:a?800:500,fontSize:14,cursor:"pointer"}}>{n}</button>;})}</div>
                <span style={{color:"#6b7280",fontWeight:600,whiteSpace:"nowrap"}}>セット</span>
                <span style={{background:"#f7fee7",color:"#4d7c0f",borderRadius:8,padding:"6px 12px",fontWeight:800,fontSize:14,whiteSpace:"nowrap"}}>＝{(Number(form.lapsPerSet)||1)*form.sets}周</span>
              </div>
            ):(
              <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
                <input type="number" value={form.minutesPerSet} onChange={e=>setForm(p=>({...p,minutesPerSet:e.target.value}))} min={1} max={120} style={{width:70,border:"2px solid #e5e7eb",borderRadius:8,padding:"9px 10px",fontSize:14,outline:"none",fontFamily:"inherit",textAlign:"center"}}/>
                <span style={{color:"#6b7280",fontWeight:600,whiteSpace:"nowrap"}}>分 ×</span>
                <div style={{display:"flex",gap:4}}>{SET_OPTIONS.map(n=>{const a=form.sets===n;return<button key={n} onClick={()=>setForm(p=>({...p,sets:n,setLabels:autoSetLabels(n)}))} style={{width:36,height:38,border:`2px solid ${a?"#15803d":"#e5e7eb"}`,borderRadius:8,background:a?"#dcfce7":"#fff",color:a?"#15803d":"#6b7280",fontWeight:a?800:500,fontSize:14,cursor:"pointer"}}>{n}</button>;})}</div>
                <span style={{color:"#6b7280",fontWeight:600,whiteSpace:"nowrap"}}>セット</span>
                <span style={{background:"#dcfce7",color:"#15803d",borderRadius:8,padding:"6px 12px",fontWeight:800,fontSize:14,whiteSpace:"nowrap"}}>＝{(Number(form.minutesPerSet)||0)*form.sets}分</span>
              </div>
            )}
            {form.sets>=2&&(
              <div style={{marginTop:12,background:"#f9fafb",borderRadius:8,padding:"10px 12px"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                  <span style={{fontSize:11,fontWeight:700,color:"#9ca3af"}}>各セットの内容</span>
                  <span style={{fontSize:11,color:"#15803d",fontWeight:700}}>✓ 自動設定</span>
                </div>
                <div style={{display:"flex",flexDirection:"column",gap:6}}>
                  {(form.setLabels||[]).map((val,i)=>{const c=SET_LABEL_COLOR[val]||"#6b7280";return(
                    <div key={i} style={{display:"flex",alignItems:"center",gap:8}}>
                      <span style={{fontSize:12,fontWeight:700,color:"#fff",background:"#6b7280",borderRadius:99,width:22,height:22,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>{i+1}</span>
                      <span style={{padding:"4px 16px",borderRadius:99,fontSize:13,fontWeight:700,background:c+"22",color:c,border:`2px solid ${c}55`}}>{val}</span>
                    </div>
                  );})}
                </div>
              </div>
            )}
          </div>
          <TargetSelector grade={form.grade||""} gender={form.gender||""} onGradeChange={v=>setForm(p=>({...p,grade:v}))} onGenderChange={v=>setForm(p=>({...p,gender:v}))}/>
          <div style={{marginBottom:14}}>
            <div style={{fontSize:12,fontWeight:700,color:"#6b7280",marginBottom:5}}>説明（任意）</div>
            <textarea value={form.description} onChange={e=>setForm(p=>({...p,description:e.target.value}))} placeholder="練習内容や注意点など" style={{width:"100%",boxSizing:"border-box",border:"2px solid #e5e7eb",borderRadius:8,padding:"9px 12px",fontSize:13,minHeight:72,fontFamily:"inherit",resize:"vertical",outline:"none"}}/>
          </div>
          <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
            <Btn variant="ghost" onClick={()=>setDrillModal(null)}>キャンセル</Btn>
            <Btn onClick={saveDrill} disabled={!form.name.trim()||syncing}>{syncing?"保存中...":"保存する"}</Btn>
          </div>
        </Modal>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
